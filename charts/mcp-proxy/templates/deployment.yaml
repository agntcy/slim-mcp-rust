apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-proxy.fullname" . }}
  labels:
    {{- include "mcp-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mcp-proxy.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mcp-proxy.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
          - /slim-mcp-proxy
          args:
          - --config
          - /config/mcp-proxy-config.yaml
          - --svc-name
          - {{ .Values.proxy.slim.serviceName | quote }}
          - --name
          - {{ .Values.proxy.name | quote }}
          {{- if .Values.proxy.instanceId }}
          - --id
          - {{ .Values.proxy.instanceId | quote }}
          {{- end }}
          - --mcp-server
          - {{ .Values.proxy.mcpServer.url | quote }}
          {{- if .Values.proxy.auth.sharedSecret.enabled }}
          - --secret
          {{- if .Values.proxy.auth.sharedSecret.existingSecret }}
          - $(SHARED_SECRET)
          {{- else }}
          - {{ .Values.proxy.auth.sharedSecret.value | quote }}
          {{- end }}
          {{- end }}
          {{- if .Values.proxy.auth.spire.enabled }}
          {{- if .Values.proxy.auth.spire.socketPath }}
          - --spire-socket-path
          - {{ .Values.proxy.auth.spire.socketPath | quote }}
          {{- end }}
          {{- if .Values.proxy.auth.spire.targetSpiffeId }}
          - --spire-target-spiffe-id
          - {{ .Values.proxy.auth.spire.targetSpiffeId | quote }}
          {{- end }}
          {{- if .Values.proxy.auth.spire.jwtAudiences }}
          - --spire-jwt-audience
          - {{ .Values.proxy.auth.spire.jwtAudiences | quote }}
          {{- end }}
          {{- end }}
          {{- if and .Values.proxy.auth.sharedSecret.enabled .Values.proxy.auth.sharedSecret.existingSecret }}
          env:
          - name: SHARED_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Values.proxy.auth.sharedSecret.existingSecret.name }}
                key: {{ .Values.proxy.auth.sharedSecret.existingSecret.key }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          - name: config
            mountPath: /config
            readOnly: true
          - name: tmp
            mountPath: /tmp
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "mcp-proxy.fullname" . }}-config
      - name: tmp
        emptyDir: {}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
