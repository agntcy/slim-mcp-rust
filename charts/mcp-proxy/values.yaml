# Default values for mcp-proxy.

replicaCount: 1

image:
  repository: ghcr.io/agntcy/slim-mcp-rust/mcp-proxy
  pullPolicy: IfNotPresent
  tag: "0.2.5"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# MCP Proxy Configuration
proxy:
  name: "org/mcp/k8s-proxy"
  instanceId: ""
  mcpServer:
    # URL of the MCP server to connect to
    url: "http://kubernetes-mcp-server:8080/mcp"

  # Authentication configuration
  # Only one authentication method should be configured
  auth:
    # Shared secret authentication
    sharedSecret:
      enabled: true
      # Secret value (minimum 32 characters)
      # Can also be provided via existing secret (see existingSecret below)
      value: "default-shared-secret-value-please-change"
      # Use an existing Kubernetes Secret for the shared secret
      # existingSecret:
      #   name: mcp-proxy-secret
      #   key: shared-secret
    # SPIRE authentication
    spire:
      enabled: false
      # Path to SPIRE Workload API socket
      # Example: "unix:/tmp/spire-agent/public/api.sock"
      socketPath: ""
      # Optional target SPIFFE ID
      targetSpiffeId: ""
      # Optional JWT audiences (comma-separated)
      # Example: "audience1,audience2"
      jwtAudiences: ""

  slim:
    serviceName: "slim/0"
    server:
      # SLIM server endpoint
      # With fullnameOverride set above, the service name is 'slim'
      endpoint: "http://slim:46357"
      tls:
        insecure: true
    tracing:
      logLevel: "info"
      displayThreadNames: true
      displayThreadIds: true

# SLIM is installed as a dependency (see Chart.yaml)
# Set to false if you want to install SLIM separately
slim:
  enabled: false
  # Override the service name to be just 'slim' instead of 'mcp-proxy-slim'
  fullnameOverride: "slim"
