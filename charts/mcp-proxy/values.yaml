# Default values for mcp-proxy.

replicaCount: 1

image:
  repository: ghcr.io/agntcy/slim-mcp-rust/mcp-proxy
  pullPolicy: IfNotPresent
  tag: "0.2.5"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# MCP Proxy Configuration
proxy:
  name: "org/mcp/k8s-proxy"
  instanceId: ""
  mcpServer:
    # URL of the MCP server to connect to
    url: "http://kubernetes-mcp-server:8080/mcp"
  slim:
    serviceName: "slim/0"
    server:
      # SLIM server endpoint
      # With fullnameOverride set above, the service name is 'slim'
      endpoint: "http://slim:46357"
      tls:
        insecure: true
    runtime:
      nCores: 0
      threadName: "slim-data-plane"
      drainTimeout: "10s"
    tracing:
      logLevel: "info"
      displayThreadNames: true
      displayThreadIds: true

# SLIM is installed as a dependency (see Chart.yaml)
# Set to false if you want to install SLIM separately
slim:
  enabled: false
  # Override the service name to be just 'slim' instead of 'mcp-proxy-slim'
  fullnameOverride: "slim"
