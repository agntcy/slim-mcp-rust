---
version: "3"

silent: true
set: [pipefail]
shopt: [globstar]

vars:
  CARGO_COMPONENTS: "cargo-sort cargo-audit cargo-llvm-cov cargo-machete@0.7.0 cargo-deny@0.17.0 typos-cli"

tasks:
  mcp-proxy:test:run-slim:
    desc: run slim instance
    cmds:
      - |
        cd examples/config/
        docker run -it -v ./slim-server-config.yaml:/config.yaml -p 46357:46357 ghcr.io/agntcy/slim:1.3.0 /slim --config /config.yaml

  mcp-proxy:test:run-mcp-server:
    desc: run mcp server using SSE transport
    cmds:
      - |
        cd examples/mcp-server/
        uv run main.py --port 8000

  mcp-proxy:run:
    desc: run mcp proxy
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        cargo run -- --config config/mcp-proxy-config.yaml \
          --svc-name slim/0 --name org/mcp/proxy \
          --mcp-server http://localhost:8000/mcp

  mcp-proxy:test:run-mcp-client:
    desc: run a simple MCP client that use SLIM as transport protocol
    cmds:
      - |
        cd examples/mcp-slim-client
        uv run main.py

  mcp-proxy:test:reinstall-and-run-mcp-client:
    desc: run a simple MCP client that use SLIM as transport protocol
    cmds:
      - |
        cd examples/mcp-slim-client
        uv run --reinstall main.py

  mcp-proxy:build:strip:
    desc: "Build the project and strip the debug symbols"
    cmds:
      - task: build
      - task: toolchain:strip
        vars:
          TARGET_BIN: "target/{{.TARGET}}/{{.PROFILE}}/slim-mcp-proxy"

  # Kubernetes testing tasks
  mcp-proxy:k8s:create-cluster:
    desc: create a kind cluster for testing
    cmds:
      - |
        echo "Creating kind cluster for MCP testing..."
        cd examples/k8s-test/kind-config
        kind create cluster --config kind-cluster-config.yaml
        echo "Cluster created successfully!"
        echo "Cluster info:"
        kubectl cluster-info --context kind-mcp-test

  mcp-proxy:k8s:delete-cluster:
    desc: delete the kind cluster
    cmds:
      - |
        echo "Deleting kind cluster..."
        kind delete cluster --name mcp-test
        echo "Cluster deleted successfully!"


  mcp-proxy:k8s:run-client:
    desc: run kubernetes test client through SLIM
    cmds:
      - |
        cd examples/k8s-test/mcp-client
        echo "Starting Kubernetes MCP Test Client..."
        echo "Connecting via SLIM to MCP proxy..."
        echo ""
        uv run client.py

  mcp-proxy:k8s:install-all-charts:
    desc: install SLIM, MCP proxy, and kubernetes-mcp-server in kind cluster
    dir: "{{.TASKFILE_DIR}}/.."
    cmds:
      - |
        echo "Updating Helm dependencies..."
        helm dependency update ./charts/mcp-proxy
      - |
        echo "Installing kubernetes-mcp-server..."
        helm install kubernetes-mcp-server oci://ghcr.io/containers/charts/kubernetes-mcp-server \
          -n mcp-system \
          --create-namespace \
          -f mcp-proxy/examples/k8s-test/mcp-server-config/kubernetes-mcp-server-values.yaml
      - |
        echo "Installing MCP proxy chart (includes SLIM as dependency)..."
        helm install mcp-proxy ./charts/mcp-proxy \
          -n mcp-system \
          --create-namespace \
          -f mcp-proxy/examples/k8s-test/mcp-proxy-config/mcp-proxy-values.yaml
        echo "MCP proxy, SLIM, and kubernetes-mcp-server installed in kind cluster!"

  mcp-proxy:k8s:install-all-charts-using-local-proxy:
    desc: create cluster and install all charts using locally built MCP proxy image
    dir: "{{.TASKFILE_DIR}}/.."
    cmds:
      - task: mcp-proxy:k8s:build-local-image
      - task: mcp-proxy:k8s:load-local-image
      - |
        echo "Updating Helm dependencies..."
        helm dependency update ./charts/mcp-proxy
      - |
        echo "Installing kubernetes-mcp-server..."
        helm install kubernetes-mcp-server oci://ghcr.io/containers/charts/kubernetes-mcp-server \
          -n mcp-system \
          --create-namespace \
          -f mcp-proxy/examples/k8s-test/mcp-server-config/kubernetes-mcp-server-values.yaml
      - |
        echo "Installing MCP proxy chart with local image (includes SLIM as dependency)..."
        VERSION=$(grep '^version = ' mcp-proxy/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
        helm install mcp-proxy ./charts/mcp-proxy \
          -n mcp-system \
          --create-namespace \
          -f mcp-proxy/examples/k8s-test/mcp-proxy-config/mcp-proxy-values.yaml \
          --set image.tag=$VERSION \
          --set image.pullPolicy=Never
        echo "Kind cluster created and all charts installed with local MCP proxy image!"

  mcp-proxy:k8s:uninstall-all-charts:
    desc: uninstall MCP proxy and kubernetes-mcp-server Helm charts
    cmds:
      - |
        echo "Uninstalling MCP proxy and kubernetes-mcp-server..."
        helm uninstall mcp-proxy -n mcp-system 2>/dev/null || echo "mcp-proxy not found"
        helm uninstall kubernetes-mcp-server -n mcp-system 2>/dev/null || echo "kubernetes-mcp-server not found"
        echo "Helm charts uninstalled successfully!"

  mcp-proxy:k8s:port-forward:
    desc: port forward SLIM server for client testing
    cmds:
      - |
        echo "Port forwarding SLIM server to localhost:46357..."
        echo "Press Ctrl+C to stop"
        echo ""
        kubectl port-forward svc/slim 46357:46357 -n mcp-system

  mcp-proxy:k8s:build-local-image:
    desc: build MCP proxy Docker image locally
    dir: "{{.TASKFILE_DIR}}/.."
    cmds:
      - |
        echo "Building MCP proxy Docker image locally..."
        VERSION=$(grep '^version = ' mcp-proxy/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
        echo "Version: $VERSION"
        docker build -t ghcr.io/agntcy/slim-mcp-rust/mcp-proxy:$VERSION -f mcp-proxy/Dockerfile .
        docker tag ghcr.io/agntcy/slim-mcp-rust/mcp-proxy:$VERSION ghcr.io/agntcy/slim-mcp-rust/mcp-proxy:latest
        echo "Docker image built: ghcr.io/agntcy/slim-mcp-rust/mcp-proxy:$VERSION"

  mcp-proxy:k8s:load-local-image:
    desc: load local MCP proxy image into kind cluster
    dir: "{{.TASKFILE_DIR}}/.."
    cmds:
      - |
        echo "Loading MCP proxy image into kind cluster..."
        VERSION=$(grep '^version = ' mcp-proxy/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
        kind load docker-image ghcr.io/agntcy/slim-mcp-rust/mcp-proxy:$VERSION --name mcp-test
        echo "Image loaded into kind cluster"