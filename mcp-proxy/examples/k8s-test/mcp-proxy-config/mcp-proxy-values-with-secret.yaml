# Override values for mcp-proxy deployment in Kubernetes using existing Secret
# This configures the proxy to connect to kubernetes-mcp-server using a Kubernetes Secret for authentication

# Enable SLIM as a dependency
slim:
  enabled: true
  fullnameOverride: "slim"

# MCP Proxy Configuration
proxy:
  mcpServer:
    # kubernetes-mcp-server MCP endpoint
    url: "http://kubernetes-mcp-server:8080/mcp"
  # Authentication configuration using existing Kubernetes Secret
  auth:
    sharedSecret:
      enabled: true
      # Don't set value here - use existingSecret instead
      value: ""
      existingSecret:
        name: mcp-proxy-secret
        key: shared-secret
